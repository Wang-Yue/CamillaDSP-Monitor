name: Build Release

on:
  push:
    tags:
      - 'v*' # Run when a tag starting with 'v' is pushed
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        engine: [swift, rust]
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Rust
      if: matrix.engine == 'rust'
      uses: dtolnay/rust-toolchain@stable

    - name: Build App
      run: |
        make app MODE=release ENGINE=${{ matrix.engine }}

    - name: Zip App
      run: |
        zip -r DSPMonitor-${{ matrix.engine }}.zip DSPMonitor.app

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DSPMonitor-${{ matrix.engine }}
        path: DSPMonitor-${{ matrix.engine }}.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: DSPMonitor-${{ matrix.engine }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
